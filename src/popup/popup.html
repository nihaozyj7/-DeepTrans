<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepSeek Translator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <img src="../icons/icon48.png" alt="Logo" class="logo">
      <div class="header-text">
        <h1>DeepSeek Translator</h1>
      </div>
    </div>

    <div class="status" id="status">
      <span class="status-dot"></span>
      <span class="status-text">就绪</span>
    </div>

    <div class="buttons">
      <button id="btn-translate-page" class="btn btn-primary">
        <span class="btn-emoji">📄</span>
        翻译整个页面
      </button>
      <button id="btn-translate-selection" class="btn btn-secondary">
        <span class="btn-emoji">✏️</span>
        翻译选中文本
      </button>
      <div class="btn-row">
        <button id="btn-toggle" class="btn btn-outline btn-half">
          <span class="btn-emoji">🔄</span>
          切换原文
        </button>
        <button id="btn-clear" class="btn btn-outline btn-half btn-danger">
          <span class="btn-emoji">🗑️</span>
          清除翻译
        </button>
      </div>
      <div class="btn-row">
        <button id="btn-clear-cache" class="btn btn-outline btn-half">
          <span class="btn-emoji">🧹</span>
          清除缓存
        </button>
        <button id="btn-pick-exclude" class="btn btn-outline btn-half">
          <span class="btn-emoji">🎯</span>
          排除选择
        </button>
      </div>
    </div>

    <div class="footer">
      <a href="#" id="btn-options" class="link">打开设置</a>
      <span class="shortcut">Alt+A</span>
    </div>
  </div>

  <script src="../../dist/popup.js"></script>
</body>
</html>
